name: Build

on:
  push:
    branches: [ main ]
    tags: [ '*' ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # suppress Node.js 20 deprecation warnings

jobs:
  build:
    name: Build (macOS arm64)
    runs-on: macos-14   # Apple Silicon — stable free-tier runner

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        # cmake and ninja are pre-installed on GitHub-hosted macOS runners
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          cmake --build build \
            --target Begonia_VST3 Begonia_AU Begonia_Standalone \
            -j4

      - name: Package
        run: |
          cd build/Begonia_artefacts
          zip -r "$GITHUB_WORKSPACE/Begonia-VST3-macOS.zip"        VST3/Begonia.vst3
          zip -r "$GITHUB_WORKSPACE/Begonia-AU-macOS.zip"          AU/Begonia.component
          zip -r "$GITHUB_WORKSPACE/Begonia-Standalone-macOS.zip"  Standalone/Begonia.app

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Begonia-macOS
          path: Begonia-*-macOS.zip
          retention-days: 30

  release:
    name: Attach to Release
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'release'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: Begonia-macOS
          path: artifacts

      - name: Attach zips to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: artifacts/*.zip
