name: Build

on:
  push:
    branches: [ main ]
    tags: [ '*' ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]   # also fires when a release is created via the GitHub UI

jobs:
  build:
    name: Build (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13
            arch: x86_64
          - os: macos-14
            arch: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Ninja
        run: brew install ninja

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          cmake --build build \
            --target Begonia_VST3 Begonia_AU Begonia_Standalone \
            -j4

      - name: Package
        run: |
          ARCH=${{ matrix.arch }}
          cd build/Begonia_artefacts
          zip -r "$GITHUB_WORKSPACE/Begonia-VST3-macOS-${ARCH}.zip"        VST3/Begonia.vst3
          zip -r "$GITHUB_WORKSPACE/Begonia-AU-macOS-${ARCH}.zip"          AU/Begonia.component
          zip -r "$GITHUB_WORKSPACE/Begonia-Standalone-macOS-${ARCH}.zip"  Standalone/Begonia.app

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Begonia-macOS-${{ matrix.arch }}
          path: Begonia-*-macOS-${{ matrix.arch }}.zip
          retention-days: 30

  release:
    name: Attach to Release
    # Run when a tag is pushed OR a release is published via the GitHub UI
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'release'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Attach zips to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: artifacts/*.zip
