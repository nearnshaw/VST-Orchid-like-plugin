name: Build

on:
  push:
    branches: [ main ]
    tags: [ '*' ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build (macOS arm64)
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build VST3
        run: cmake --build build --target Begonia_VST3 -j4

      - name: Build AU
        run: cmake --build build --target Begonia_AU -j4

      - name: Build Standalone
        run: cmake --build build --target Begonia_Standalone -j4

      - name: List artifacts
        run: |
          echo "=== Contents of build/Begonia_artefacts ==="
          find build/Begonia_artefacts -not -path '*/JuceLibraryCode/*' | sort

      - name: Package
        run: |
          set -e
          pack() {
            local name="$1" out="$2"
            local path
            path=$(find build/Begonia_artefacts -name "$name" | head -1)
            if [ -z "$path" ]; then
              echo "ERROR: $name not found after build"
              exit 1
            fi
            echo "Packing $path -> $out"
            (cd "$(dirname "$path")" && zip -r "$GITHUB_WORKSPACE/$out" "$name")
          }
          pack "Begonia.vst3"      "Begonia-VST3-macOS.zip"
          pack "Begonia.component" "Begonia-AU-macOS.zip"
          pack "Begonia.app"       "Begonia-Standalone-macOS.zip"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Begonia-macOS
          path: Begonia-*-macOS.zip
          retention-days: 30

  release:
    name: Attach to Release
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'release'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: Begonia-macOS
          path: artifacts

      - name: Attach zips to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: artifacts/*.zip
